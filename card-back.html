<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <!-- Progress Bar row: % + elapsed on left, estimated input on right -->
    <div class="progress-section">
      <div class="progress-top-row">
        <div class="progress-left">
          <span class="progress-text" id="progress-text">0%</span>
          <span class="elapsed-label">Elapsed:</span>
          <span class="elapsed-inline" id="elapsed-time">–</span>
        </div>
        <div class="progress-right">
          <label class="estimated-label" for="estimated-time">Est.:</label>
          <div class="estimated-input-wrap">
            <input
              type="text"
              id="estimated-time"
              placeholder="1h30m"
              disabled
            />
            <span class="estimated-hint" id="estimated-hint"></span>
          </div>
        </div>
      </div>
      <input
        type="range"
        min="0"
        max="100"
        value="0"
        class="slider"
        id="progress-slider"
      />
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button id="start-btn" class="btn btn-primary">Start</button>
      <button id="stop-btn" class="btn btn-danger hidden">Stop</button>
      <button id="reset-btn" class="btn btn-secondary" disabled>Reset</button>
    </div>

    <hr class="divider" />

    <!-- Manual Time Entry Section (collapsible) -->
    <div class="manual-entry">
      <button id="toggle-manual-btn" class="btn-link section-toggle">
        <span class="toggle-arrow">▶</span> Add Time Manually
      </button>
      <div id="manual-entry-body" class="hidden">
        <div class="dt-picker-group">
          <label class="dt-picker-label">Start</label>
          <div class="dt-picker-row">
            <input type="date" id="start-date-manual" class="dt-date" />
            <select id="start-hour-manual" class="dt-sel"></select>
            <span class="dt-colon">:</span>
            <select id="start-min-manual" class="dt-sel"></select>
          </div>
        </div>
        <div class="dt-picker-group">
          <label class="dt-picker-label">End</label>
          <div class="dt-picker-row">
            <input type="date" id="end-date-manual" class="dt-date" />
            <select id="end-hour-manual" class="dt-sel"></select>
            <span class="dt-colon">:</span>
            <select id="end-min-manual" class="dt-sel"></select>
          </div>
        </div>
        <div id="manual-duration-preview" class="duration-preview"></div>
        <button id="add-manual-btn" class="btn btn-secondary full-width">
          Add Manual Time Entry
        </button>
      </div>
    </div>

    <hr class="divider" />

    <!-- Time Log Display Section -->
    <div class="log-section">
      <button id="toggle-log-btn" class="btn-link">Show Time Log</button>
      <div id="time-log-container" class="hidden">
        <!-- Log entries will be injected here by JavaScript -->
      </div>
    </div>

    <script src="./js/card-back.js"></script>
  </body>
</html>
