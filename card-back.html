<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <!-- Progress Bar / Slider -->
    <div class="progress-container">
      <span class="progress-text" id="progress-text">0%</span>
      <input
        type="range"
        min="0"
        max="100"
        value="0"
        class="slider"
        id="progress-slider"
      />
    </div>

    <!-- Main Tracker Controls -->
    <div class="tracker-controls">
      <div class="row">
        <label>Elapsed Time:</label>
        <span id="elapsed-time">00:00</span>
      </div>
      <div class="row">
        <label>Estimated Time (minutes):</label>
        <input
          type="number"
          id="estimated-time"
          placeholder="e.g. 120"
          disabled
        />
      </div>
      <div class="buttons">
        <button id="start-btn" class="btn btn-primary">Start</button>
        <button id="stop-btn" class="btn btn-danger hidden">Stop</button>
        <button id="reset-btn" class="btn btn-secondary" disabled>Reset</button>
      </div>
    </div>

    <hr class="divider" />

    <!-- Manual Time Entry Section -->
    <div class="manual-entry">
      <p class="section-title">Add Time Manually</p>
      <div class="row">
        <label for="start-time-manual">Start:</label>
        <input type="datetime-local" id="start-time-manual" />
      </div>
      <div class="row">
        <label for="end-time-manual">End:</label>
        <input type="datetime-local" id="end-time-manual" />
      </div>
      <button id="add-manual-btn" class="btn btn-secondary full-width">
        Add Manual Time Entry
      </button>
    </div>

    <hr class="divider" />

    <!-- Time Log Display Section -->
    <div class="log-section">
      <button id="toggle-log-btn" class="btn-link">Show Time Log</button>
      <div id="time-log-container" class="hidden">
        <!-- Log entries will be injected here by JavaScript -->
      </div>
    </div>

    <script src="./js/card-back.js"></script>
  </body>
</html>
